    <text x="398" y="934" font-size="15">Unknown transfer boundary</text>
    <text x="1536" y="934" text-anchor="end" font-size="14">Public evidence figure · Version 1.0 · 16 July 2026</text>
    <text x="64" y="970" font-size="14">Source: five hash-bound SEC filing receipts. Architecture classification is not a legal opinion or investment recommendation.</text>
